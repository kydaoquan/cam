<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Stream System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #11141A;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- GIAO DIỆN MÀN HÌNH CHÍNH (GIỐNG ẢNH MẪU CỦA MÀY) --- */
        #main-container {
            width: 100%;
            max-width: 400 bounds;
            padding: 0 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        /* Icon phát sóng phát quang nhẹ */
        .stream-icon-box {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: rgba(77, 128, 245, 0.06);
            border: 1.5px solid rgba(77, 128, 245, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
        }

        .stream-icon {
            width: 48px;
            height: 48px;
            fill: #4D80F5;
        }

        /* Tiêu đề */
        h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            margin-bottom: 50px;
            text-align: center;
        }

        /* Ô nhập liệu CHANNEL ID */
        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 28px;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background-color: #11141A;
            padding: 0 6px;
            font-size: 13px;
            font-weight: bold;
            color: #4D80F5;
            letter-spacing: 0.5px;
            z-index: 1;
        }

        .stream-input {
            width: 100%;
            height: 65px;
            background-color: #191C24;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .stream-input:focus {
            border-color: #4D80F5;
        }

        /* Nút Bắt đầu phát */
        .btn-start {
            width: 100%;
            height: 58px;
            background-color: #4D80F5;
            color: #ffffff;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-start:active {
            background-color: #3b6ed9;
        }

        /* --- KHUNG WEBVIEW NHÚNG VDO.NINJA --- */
        #stream-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background-color: #000000;
            z-index: 10;
        }

        /* Nút tắt luồng quay lại màn hình chính */
        #btn-close {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="stream-icon-box">
            <svg class="stream-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
        </div>
        <h1>KĐQ STREAM SYSTEM</h1>
        <div class="subtitle">KĐQ High-Quality Integration</div>

        <div class="input-group">
            <span class="input-label">CHANNEL ID</span>
            <input type="text" id="channel-id" class="stream-input" placeholder="Nhập ID..." value="quocdang">
        </div>

        <button class="btn-start" onclick="startStream()">BẮT ĐẦU PHÁT</button>
    </div>

    <button id="btn-close" onclick="stopStream()">✕</button>
    <iframe id="stream-iframe" allow="camera;microphone;autoplay;fullscreen"></iframe>

    <script>
        function startStream() {
            const idInput = document.getElementById('channel-id').value.trim();
            if (!idInput) {
                alert('Nhập ID vào đã mày ơi!');
                return;
            }

            const mainContainer = document.getElementById('main-container');
            const iframe = document.getElementById('stream-iframe');
            const btnClose = document.getElementById('btn-close');

            // Cấu hình URL VDO.Ninja (ép camera sau, chất lượng cao, tự chạy)
            const vdoUrl = `https://vdo.ninja/?push=${idInput}&facing=back&quality=0&autostart&clean`;

            // Ẩn giao diện chính, hiện khung stream lên toàn màn hình
            mainContainer.style.display = 'none';
            iframe.src = vdoUrl;
            iframe.style.display = 'block';
            btnClose.style.display = 'flex';

            // Yêu cầu trình duyệt giữ màn hình luôn sáng (nếu trình duyệt hỗ trợ)
            if (navigator.wakeLock) {
                navigator.wakeLock.request('screen').catch(err => console.log('WakeLock lỗi:', err));
            }
        }

        function stopStream() {
            const mainContainer = document.getElementById('main-container');
            const iframe = document.getElementById('stream-iframe');
            const btnClose = document.getElementById('btn-close');

            // Tắt luồng, reset iframe và hiện lại màn hình nhập ID
            iframe.src = '';
            iframe.style.display = 'none';
            btnClose.style.display = 'none';
            mainContainer.style.display = 'flex';
        }
    </script>
</body>
</html>
