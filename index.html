<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera + Overlay</title>

<style>
body { margin:0; background:#000; font-family:Arial; }

iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

/* Overlay */
.overlay {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  font-size:20px;
  font-weight:bold;
}

.player {
  padding:8px 16px;
  border-radius:8px;
  color:#fff;
}

.red { background:red; }
.blue { background:blue; }

.score {
  background:#000;
  padding:8px 16px;
  border-radius:8px;
}

/* Control panel */
.controls {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

input {
  padding:5px;
  border-radius:5px;
  border:none;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
}

.stop { background:#d50000; }
</style>
</head>

<body>

<iframe id="videoFrame"></iframe>

<!-- Overlay hiển thị -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="score" id="score">0 - 0</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- Điều khiển -->
<div class="controls">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <input id="scoreInput" placeholder="Tỉ số (vd: 1-0)">

  <button onclick="updateOverlay()">Cập nhật</button>
  <button onclick="startStream()">Start</button>
  <button class="stop" onclick="stopStream()">Stop</button>
</div>

<script>
function startStream() {
  document.getElementById("videoFrame").src =
    "https://vdo.ninja/?push=quocdang&autostart&cleanoutput&quality=0&bitrate=4000&buffer=0";
}

function stopStream() {
  document.getElementById("videoFrame").src = "";
}

function updateOverlay() {
  const n1 = document.getElementById("input1").value;
  const n2 = document.getElementById("input2").value;
  const sc = document.getElementById("scoreInput").value;

  if (n1) document.getElementById("name1").innerText = n1;
  if (n2) document.getElementById("name2").innerText = n2;
  if (sc) document.getElementById("score").innerText = sc;
}
</script>

</body>
</html>
