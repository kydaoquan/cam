<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Stream System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #11141A;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- GIAO DIỆN MÀN HÌNH CHÍNH (ĐẸP CHUẨN) --- */
        #main-container {
            width: 100%;
            max-width: 400px;
            padding: 0 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .stream-icon-box {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: rgba(77, 128, 245, 0.06);
            border: 1.5px solid rgba(77, 128, 245, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
        }

        .stream-icon {
            width: 48px;
            height: 48px;
            fill: #4D80F5;
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            margin-bottom: 40px;
            text-align: center;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background-color: #11141A;
            padding: 0 6px;
            font-size: 13px;
            font-weight: bold;
            color: #4D80F5;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        .stream-input {
            width: 100%;
            height: 65px;
            background-color: #191C24;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .stream-input:focus {
            border-color: #4D80F5;
        }

        .stream-select {
            width: 100%;
            height: 65px;
            background-color: #191C24;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-align-last: center;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        /* Khung bọc nút phát để tạo vùng bấm tàng hình */
        .btn-wrapper {
            position: relative;
            width: 100%;
            height: 58px;
            margin-top: 10px;
        }

        .btn-start {
            width: 100%;
            height: 100%;
            background-color: #4D80F5;
            color: #ffffff;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- KHUNG IFRAME PHÉP THUẬT --- */
        #stream-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: #000000;
            z-index: 10;
            /* Ban đầu khi chưa bấm phát: thu nhỏ, biến thành tàng hình nằm đè lên nút Bắt Đầu Phát */
            opacity: 0; 
            pointer-events: auto;
        }

        /* Lớp CSS kích hoạt khi vào trận live chính thức */
        #stream-iframe.live-active {
            opacity: 1 !important;
            width: 100vw !important;
            height: 100vh !important;
            top: 0 !important;
            left: 0 !important;
            border-radius: 0 !important;
        }

        #btn-close {
            position: fixed;
            top: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="stream-icon-box">
            <svg class="stream-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
        </div>
        <h1>KĐQ STREAM SYSTEM</h1>
        <div class="subtitle">KĐQ High-Quality Integration</div>

        <div class="input-group">
            <span class="input-label">CHANNEL ID</span>
            <input type="text" id="channel-id" class="stream-input" placeholder="Nhập ID..." value="quocdang">
        </div>

        <div class="input-group">
            <span class="input-label">QUALITY RESOLUTION</span>
            <select id="stream-quality" class="stream-select" onchange="updateStreamUrl()">
                <option value="hd">HD (720p - Tiết kiệm mạng)</option>
                <option value="fhd" selected>FULL HD (1080p - Chuẩn căng)</option>
                <option value="2k">2K (1440p - Cực nét)</option>
            </select>
        </div>

        <div class="btn-wrapper" id="button-area">
            <button class="btn-start">BẮT ĐẦU PHÁT</button>
        </div>
    </div>

    <button id="btn-close" onclick="stopStream()">✕</button>
    
    <iframe id="stream-iframe" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>

    <script>
        // Hàm cập nhật URL liên tục theo ID và Chất lượng mà mày nhập
        function updateStreamUrl() {
            const idInput = document.getElementById('channel-id').value.trim() || 'quocdang';
            const qualityInput = document.getElementById('stream-quality').value;
            const iframe = document.getElementById('stream-iframe');

            let videoBitrate = 4000;
            let width = 1920;
            let height = 1080;

            if (qualityInput === 'hd') {
                videoBitrate = 2000;
                width = 1280;
                height = 720;
            } else if (qualityInput === '2k') {
                videoBitrate = 8000;
                width = 2560;
                height = 1440;
            }

            // Ép tham số để dọn sạch bóng dáng của Screen Share và nhảy thẳng vào Camera
            iframe.src = `https://vdo.ninja/?push=${idInput}&facing=back&width=${width}&height=${height}&videobitrate=${videoBitrate}&scale=100&autostart=1&clean=1&pushsel=1&m=0&o=0`;
        }

        // Định vị cái Iframe tàng hình nằm đè khít lên nút Bắt Đầu Phát
        function positionIframeOverButton() {
            const btnArea = document.getElementById('button-area');
            const iframe = document.getElementById('stream-iframe');
            if(iframe.classList.contains('live-active')) return;

            const rect = btnArea.getBoundingClientRect();
            
            // Ép kích thước khung nhúng bằng đúng kích thước cái nút xanh của mày
            iframe.style.width = rect.width + 'px';
            iframe.style.height = rect.height + 'px';
            iframe.style.top = rect.top + 'px';
            iframe.style.left = rect.left + 'px';
            iframe.style.borderRadius = '18px'; // Bo góc giống nút luôn
        }

        // Khởi tạo vị trí ban đầu và cập nhật URL
        updateStreamUrl();
        setTimeout(positionIframeOverButton, 500);
        window.addEventListener('resize', positionIframeOverButton);
        document.getElementById('channel-id').addEventListener('input', updateStreamUrl);

        // Lắng nghe sự kiện click của VDO.Ninja bên trong Iframe để kích hoạt toàn màn hình
        window.addEventListener('blur', function() {
            // Kiểm tra xem có phải người dùng vừa chạm trúng khu vực nút bấm (iframe tàng hình) hay không
            if (document.activeElement === document.getElementById('stream-iframe')) {
                const iframe = document.getElementById('stream-iframe');
                const mainContainer = document.getElementById('main-container');
                const btnClose = document.getElementById('btn-close');

                // Bật chế độ Fullscreen của trình duyệt
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) docElm.requestFullscreen();
                else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();

                // Biến hình Iframe từ tàng hình thành Full màn hình hiển thị Camera
                iframe.classList.add('live-active');
                mainContainer.style.display = 'none';
                btnClose.style.display = 'flex';

                // Giữ sáng màn hình không cho ngủ máy
                if (navigator.wakeLock) {
                    navigator.wakeLock.request('screen').catch(err => console.log(err));
                }
            }
        });

        function stopStream() {
            const mainContainer = document.getElementById('main-container');
            const iframe = document.getElementById('stream-iframe');
            const btnClose = document.getElementById('btn-close');

            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();

            // Reset trạng thái Iframe về lại cái nút tàng hình
            iframe.classList.remove('live-active');
            updateStreamUrl();
            setTimeout(positionIframeOverButton, 300);
            
            btnClose.style.display = 'none';
            mainContainer.style.display = 'flex';
            window.focus();
        }
    </script>
</body>
</html>
